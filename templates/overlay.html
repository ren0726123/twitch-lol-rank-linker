<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Chat OBS Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        window.pendingChannel = null;
        function loadFallbackTmi() {
            console.warn("Local tmi.min.js failed to load. Loading fallback from master repository CDN...");
            const script = document.createElement('script');
            script.src = "https://raw.githubusercontent.com/tmijs/tmi.js/master/dist/tmi.min.js";
            script.onload = () => {
                console.log("Fallback tmi.js loaded successfully.");
                if (window.pendingChannel) {
                    startChatMonitor(window.pendingChannel);
                }
            };
            script.onerror = () => {
                console.error("Fallback CDN also failed to load tmi.js.");
                const logArea = document.getElementById('chatLogArea');
                if (logArea) {
                    logArea.innerHTML = `<div class="chat-system-msg" style="color: #f23f43;">初期化エラー: tmi.js の読み込みに失敗しました。接続環境をご確認ください。</div>`;
                }
            };
            document.head.appendChild(script);
        }
    </script>
    <script src="/static/tmi.min.js" onerror="loadFallbackTmi()"></script>
    <style>
        :root {
            --text-primary: #ffffff;
            --text-secondary: #b9bbbe;
            --accent-discord: #5865f2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', "gg sans", "Inter", sans-serif;
            background-color: transparent; /* 背景透過 */
            margin: 0;
            padding: 10px;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* チャット表示エリア（下から上に伸びるレイアウト） */
        .chat-log-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        #chatLogArea {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .chat-message {
            animation: slideIn 0.25s ease-out;
            line-height: 1.5;
            font-size: 1.15rem; /* 配信画面で見やすいサイズ */
            word-break: break-all;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            color: var(--text-primary);
            /* あらゆる背景で文字がくっきり読める縁取りシャドウ */
            text-shadow: 
                1px 1px 0px #000, -1px -1px 0px #000, 
                1px -1px 0px #000, -1px 1px 0px #000,
                0px 1px 0px #000, 0px -1px 0px #000, 
                1px 0px 0px #000, -1px 0px 0px #000,
                1px 1px 3px rgba(0, 0, 0, 0.9);
            padding: 4px 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .chat-system-msg {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-style: italic;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
            padding: 4px 6px;
        }

        .badges-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-right: 2px;
            flex-shrink: 0;
        }

        .badge-champ {
            height: 1.5em;
            width: 1.5em;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
            vertical-align: middle;
        }

        .badge-rank {
            height: 1.5em;
            width: 1.5em;
            object-fit: contain;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="chat-log-container">
        <div id="chatLogArea">
            <div class="chat-system-msg">Twitch チャットサーバー接続準備中...</div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let tmiClient = null;
        let ddragonVersion = "14.11.1"; // デフォルトフォールバック
        const linkedUsersMap = new Map();
        const pendingRequests = new Set();

        // ページ読み込み時にパラメータからチャンネル名を取得して自動接続
        window.addEventListener('DOMContentLoaded', async () => {
            // Data Dragon の最新バージョンを取得
            try {
                const response = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
                if (response.ok) {
                    const versions = await response.json();
                    if (versions && versions.length > 0) {
                        ddragonVersion = versions[0];
                    }
                }
            } catch (err) {
                console.error("Failed to fetch Data Dragon version:", err);
            }

            const urlParams = new URLSearchParams(window.location.search);
            const channel = urlParams.get('channel') || 'rensqn_'; // 未指定時はデフォルトで rensqn_
            startChatMonitor(channel.trim().toLowerCase());
        });

        // 暗すぎるユーザーカラーを明るく補正するヘルパー
        function getContrastColor(hexColor) {
            if (!hexColor || hexColor.length < 7) return '#5865f2';

            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);

            const hsp = Math.sqrt(
                0.299 * (r * r) +
                0.587 * (g * g) +
                0.114 * (b * b)
            );

            if (hsp < 90) {
                const factor = 0.65;
                const newR = Math.floor(r + (255 - r) * factor);
                const newG = Math.floor(g + (255 - g) * factor);
                const newB = Math.floor(b + (255 - b) * factor);

                const toHex = (c) => ('0' + c.toString(16)).slice(-2);
                return `#${toHex(newR)}${toHex(newG)}${toHex(newB)}`;
            }

            return hexColor;
        }

        // tmi.js によるチャット監視の開始 (CDN/ローカルロードエラーを防ぐ堅牢なエラーハンドリング付き)
        function startChatMonitor(channel) {
            const logArea = document.getElementById('chatLogArea');

            if (typeof tmi === 'undefined') {
                window.pendingChannel = channel;
                logArea.innerHTML = `<div class="chat-system-msg">tmiライブラリをロード中... (フォールバック試行中)</div>`;
                return;
            }

            logArea.innerHTML = `<div class="chat-system-msg">#${escapeHtml(channel)} のチャットサーバーに接続中...</div>`;

            if (tmiClient) {
                try {
                    tmiClient.disconnect();
                } catch (e) {
                    console.error("Disconnect error:", e);
                }
            }

            try {

                tmiClient = new tmi.Client({
                    options: { debug: false },
                    connection: {
                        reconnect: true,
                        secure: true
                    },
                    channels: [channel]
                });

                tmiClient.on('connected', (address, port) => {
                    logArea.innerHTML = `<div class="chat-system-msg">#${escapeHtml(channel)} のチャット監視を開始しました (透過オーバーレイ)</div>`;
                });

                tmiClient.on('message', (channel, tags, message, self) => {
                    parseAndAppendTmiMessage(tags, message);
                });

                tmiClient.on('disconnected', (reason) => {
                    appendSystemMessage(`チャットから切断されました: ${reason}`);
                });

                tmiClient.connect().catch(err => {
                    logArea.innerHTML = `<div class="chat-system-msg" style="color: #f23f43;">接続失敗: ${escapeHtml(err.message)}</div>`;
                });
            } catch (err) {
                console.error("Initialization error in startChatMonitor:", err);
                logArea.innerHTML = `<div class="chat-system-msg" style="color: #f23f43;">初期化エラー: ${escapeHtml(err.message)}</div>`;
            }
        }

        // 個別API照会（キャッシュ機能付き）
        async function checkUserLink(usernameLower) {
            if (pendingRequests.has(usernameLower)) return;

            const now = Date.now();
            const cached = linkedUsersMap.get(usernameLower);

            // キャッシュが有効期限内の場合はリクエストをスキップして適用
            if (cached) {
                const ttl = cached.data === 'none' ? 60000 : 600000; // 未連携は1分、連携済は10分
                if (now - cached.fetchedAt < ttl) {
                    applyRankBadgeToMessages(usernameLower, cached.data);
                    return;
                }
            }

            pendingRequests.add(usernameLower);

            try {
                const response = await fetch(`${API_URL}/user/${encodeURIComponent(usernameLower)}`);
                if (response.status === 404) {
                    linkedUsersMap.set(usernameLower, { data: 'none', fetchedAt: now });
                    applyRankBadgeToMessages(usernameLower, 'none');
                    return;
                }
                if (!response.ok) throw new Error('API error');

                const userData = await response.json();
                linkedUsersMap.set(usernameLower, { data: userData, fetchedAt: now });

                applyRankBadgeToMessages(usernameLower, userData);
            } catch (err) {
                console.error('Failed to fetch user link:', err);
            } finally {
                pendingRequests.delete(usernameLower);
            }
        }

        // バッジ適用・更新・削除
        function applyRankBadgeToMessages(usernameLower, userData) {
            const elements = document.querySelectorAll(`[data-user="${usernameLower}"]`);

            if (!userData || userData === 'none') {
                // 未連携の場合、既存のバッジとハイライトをクリア
                elements.forEach(el => {
                    const wrapper = el.querySelector('.badges-wrapper');
                    if (wrapper) wrapper.innerHTML = '';
                    el.style.background = '';
                    el.style.borderLeft = '';
                    el.style.paddingLeft = '';
                });
                return;
            }

            // 1. チャンピオンアイコンの生成 (Data Dragon)
            let champIconHtml = '';
            if (userData.main_champ) {
                const champIconUrl = `https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/img/champion/${userData.main_champ}.png`;
                champIconHtml = `<img class="badge-champ" src="${champIconUrl}" alt="${userData.main_champ}" onerror="this.style.display='none'" />`;
            }

            // 2. ランクアイコンの生成 (Community Dragon - ミニクレスト SVG)
            let rankIconHtml = '';
            const tier = userData.tier || 'UNRANKED';
            if (tier !== 'UNRANKED') {
                const rankIconUrl = `https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-mini-crests/${tier.toLowerCase()}.svg`;
                rankIconHtml = `<img class="badge-rank" src="${rankIconUrl}" alt="${tier}" onerror="this.style.display='none'" />`;
            }

            elements.forEach(el => {
                const wrapper = el.querySelector('.badges-wrapper');
                if (wrapper) {
                    wrapper.innerHTML = champIconHtml + rankIconHtml;
                }
                
                // 連携者用のマイルドなDiscordハイライト
                el.style.background = 'rgba(88, 101, 242, 0.08)';
                el.style.borderLeft = '3px solid var(--accent-discord)';
                el.style.paddingLeft = '6px';
            });
        }

        // tmi.js のメッセージ受信用パーサー
        function parseAndAppendTmiMessage(tags, message) {
            const logArea = document.getElementById('chatLogArea');
            
            const username = tags.username;
            const usernameLower = username.toLowerCase();
            const displayName = tags['display-name'] || username;
            
            let userColor = tags.color || '#5865f2';
            userColor = getContrastColor(userColor);

            // システムメッセージがあれば削除
            const systemMsgs = logArea.querySelectorAll('.chat-system-msg');
            systemMsgs.forEach(msg => logArea.removeChild(msg));

            const msgEl = document.createElement('div');
            msgEl.className = 'chat-message';
            msgEl.setAttribute('data-user', usernameLower);

            // カスタム絵文字をパースしてHTMLに置換
            const formattedMessage = formatMessageWithEmotes(message, tags.emotes);

            msgEl.innerHTML = `
                <span class="badges-wrapper"></span>
                <strong style="color: ${userColor}; font-weight: 600;">${escapeHtml(displayName)}:</strong> 
                <span style="color: var(--text-primary);">${formattedMessage}</span>
            `;

            logArea.appendChild(msgEl);

            // キャッシュ照会およびバッジ適用
            checkUserLink(usernameLower);

            // メッセージ上限数制限 (OBS画面から溢れた古いものを削除)
            while (logArea.childNodes.length > 50) {
                const firstChild = logArea.firstChild;
                if (firstChild) {
                    logArea.removeChild(firstChild);
                }
            }
        }

        // Twitch カスタム絵文字のパース処理
        function formatMessageWithEmotes(message, emotes) {
            if (!emotes) return escapeHtml(message);

            const replacements = [];
            for (const [emoteId, ranges] of Object.entries(emotes)) {
                for (const range of ranges) {
                    const [start, end] = range.split('-').map(Number);
                    replacements.push({ start, end, emoteId });
                }
            }

            // 開始インデックス順にソート
            replacements.sort((a, b) => a.start - b.start);

            let htmlResult = '';
            let lastIndex = 0;

            for (const rep of replacements) {
                if (rep.start > lastIndex) {
                    htmlResult += escapeHtml(message.substring(lastIndex, rep.start));
                }
                const url = `https://static-cdn.jtvnw.net/emoticons/v2/${rep.emoteId}/default/dark/1.0`;
                htmlResult += `<img class="twitch-emote" src="${url}" alt="emote" style="height: 1.4em; vertical-align: middle; margin: 0 2px;" />`;
                lastIndex = rep.end + 1;
            }

            if (lastIndex < message.length) {
                htmlResult += escapeHtml(message.substring(lastIndex));
            }

            return htmlResult;
        }

        function appendSystemMessage(text) {
            const logArea = document.getElementById('chatLogArea');
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-system-msg';
            msgEl.textContent = text;
            logArea.appendChild(msgEl);
        }

        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
